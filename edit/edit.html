<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="./../style.css" />
        <link rel="stylesheet" href="./edit.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Pen</title>
    </head>
    <body>
        <header>
            <div class="menu-container">
                <button class="menu-trigger">
                    <i data-lucide="menu"></i>
                </button>

                <nav class="dropdown-menu">
                    <a href="./../index.html">Projects</a>
                    <button id="btn-export" onclick="ArtBoard.exportAsPNG()">Export as PNG</button>
                </nav>
            </div>

            <div class="project-name">
                <h2 class="project-name">Untitled</h2>
            </div>
        </header>

        <main>
            <aside class="tools">
                <h2>Tools</h2>
                <div class="tools-container">
                    <button class="tool pen" title="Pen (P)">
                        <i data-lucide="pen-line"></i>
                    </button>
                    <button class="tool eraser" title="Eraser (E)">
                        <i data-lucide="eraser"></i>  
                    </button>
                    <button class="tool move" title="Move (M)" disabled>
                        <i data-lucide="move"></i>
                    </button>
                    <button class="tool type-polyline" title="Line by typing (T)">
                        <i data-lucide="line-dot-right-horizontal"></i>
                    </button>
                    <button class="tool bucket" title="Bucket (B)">
                        <i data-lucide="paint-bucket"></i>
                    </button>
                    <button class="tool pipette" title="Color Picker (P)">
                        <i data-lucide="pipette"></i>
                    </button>
                </div>
            </aside>

            <div class="canvas-container">
                <canvas class="canvas" tabindex="0"></canvas>
                <div class="dimentions">
                    0 × 0
                </div>

                <input type="range" id="eraser-size" value="1" min="1" max="10" step="1">                
                <div class="eraser-range-container">

                </div>
            </div>

            <aside class="colors">
                <h2>Colors</h2>

                <label for="selected-color">Selected</label><br />
                <input type="color" name="selected-color" id="selected-color" />
                <hr />

                <label>Recents</label>
                <div class="recent-colors"></div>
            </aside>
        </main>

        <!-- Development version -->
        <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

        <!-- Production version -->
        <!--         <script src="https://unpkg.com/lucide@latest"></script>
            -->

        <script>
            lucide.createIcons();
        </script>
        <script src="./edit.js"></script>
        
        <script src="./tools/Pipette.js"></script>
        <script src="./tools/TypePolyline.js"></script>
        <script src="./tools/Eraser.js"></script>
        <script src="./tools/Pen.js"></script>
        <script src="./tools/Bucket.js"></script>
    </body>
</html>
