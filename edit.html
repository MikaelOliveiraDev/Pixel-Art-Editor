<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="./edit.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Pen</title>
    </head>
    <body>
        <nav>

        </nav>

        <div class="canvas-container">
            <canvas class="canvas" tabindex="0"></canvas>

            <div class="pop-up set-line-direction">
                Use as teclas de setas para definir a direção da
                <strong>linha</strong>.
            </div>

            <div class="pop-up type-number">
                Digite o <strong>número</strong> de pixels nessa direção.<br />
                Use "0" para inserir 10.
            </div>
            <div class="pop-up set-curve-direction">
                Use as teclas de setas para definir a direção da
                <strong>curva</strong>.
            </div>
        </div>

        <button id="download">Download</button>

        <div>
            <h2>Tools</h2>
            <div class="tools-container">
                <button class="tool pen"><i data-lucide="pen-line"></i></button>
                <button class="tool move" disabled>
                  <i data-lucide="move"></i>
                </button>
                <button class="tool type-polyline">
                  <i data-lucide="line-dot-right-horizontal"></i>
                </button>
                <button class="tool bucket">
                  <i data-lucide="paint-bucket"></i>
                </button>
            </div>
        </div>
        <div>
            <h3>Colors</h3>

            <label for="selected-color">Selected Color</label>
            <input type="color" name="selected-color" id="selected-color" />

            <label>Recents</label>
            <div class="recent-colors"></div>
        </div>

        <!-- Development version -->
        <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

        <!-- Production version -->
        <!--         <script src="https://unpkg.com/lucide@latest"></script>
 -->

        <script>
            lucide.createIcons();
        </script>
        <script src="./script.js"></script>
    </body>
</html>
