<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="./edit.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Pen</title>
    </head>
    <body>
        <header>
            <div class="menu-container">
                <button class="menu-trigger">
                    <i data-lucide="menu"></i>
                </button>

                <nav class="dropdown-menu">
                    <a href="index.html">Projects</a>
                    <button id="btn-export">Export as PNG</button>
                </nav>
            </div>

            <div class="project-name">

                <h2 class="project-name">Untitled</h2>
            </div>
        </header>

        <main>
  
            
            <aside class="tools">
                <h2>Tools</h2>
                <div class="tools-container">
                    <button class="tool pen"><i data-lucide="pen-line"></i></button>
                    <button class="tool move" disabled>
                        <i data-lucide="move"></i>
                    </button>
                    <button class="tool type-polyline">
                        <i data-lucide="line-dot-right-horizontal"></i>
                    </button>
                    <button class="tool bucket">
                        <i data-lucide="paint-bucket"></i>
                    </button>
                </div>
            </aside>

          <div class="canvas-container">
                <canvas class="canvas" tabindex="0"></canvas>
                
                
            </div>


            <aside class="colors">
                <h3>Colors</h3>
                
                <label for="selected-color">Selected</label><br>
                <input type="color" name="selected-color" id="selected-color" />
                <hr>
                
                <label>Recents</label>
                <div class="recent-colors"></div>
            </aside>
        </main>
            
            <!-- Development version -->
            <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
            
            <!-- Production version -->
            <!--         <script src="https://unpkg.com/lucide@latest"></script>
            -->
            
            <script>
            lucide.createIcons();
        </script>
        <script src="./script.js"></script>
    </body>
    </html>
